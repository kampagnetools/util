<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSF Digital Manager Pro 1200x600</title>
    <link rel="stylesheet" href="style.css">
</head>
<body class="dark-theme" x-data="msfApp()">

<div class="app-container">
    <div class="main-layout">
        <nav class="nav-sidebar">
            <div class="logo-area">MSF TOOLKIT</div>
            <button class="nav-btn" :class="{'active': tab === 'utm'}" @click="tab = 'utm'">UTM Builder</button>
            <button class="nav-btn" :class="{'active': tab === 'sms'}" @click="tab = 'sms'">SMS Tæller</button>
            <button class="nav-btn" :class="{'active': tab === 'ext'}" @click="tab = 'ext'">Extractor</button>
            <button class="nav-btn" :class="{'active': tab === 'map'}" @click="tab = 'map'; $nextTick(() => initMap())">Kort Generator</button>
            <div style="flex:1"></div>
            <button class="theme-btn" @click="toggleTheme()">SKIFT TEMA</button>
        </nav>
        
        <div class="content-area">
            <div x-show="tab === 'utm'" x-data="utmLogic()">
                <div class="field"><label>Mål-URL</label><input type="text" x-model="url" placeholder="https://msf.dk/..."></div>
                <div class="grid-2">
                    <div class="field">
                        <label>Kanal</label>
                        <select x-model="chan">
                            <option value="fb_paid">Meta Paid Social</option>
                            <option value="fb_org">Meta Organisk</option>
                            <option value="li_paid">LinkedIn Paid</option>
                            <option value="em_news">Email Nyhedsbrev</option>
                            <option value="sms_camp">SMS Kampagne</option>
                        </select>
                    </div>
                    <div class="field">
                        <label>Type</label>
                        <select x-model="type">
                            <option value="oneoff">One-off Donation</option>
                            <option value="felt">Feltpartner (Fast)</option>
                        </select>
                    </div>
                </div>
                <div class="grid-2">
                    <div class="field"><label>Kampagnekode</label><input type="text" x-model="code" maxlength="4"></div>
                    <div class="field">
                        <label>Versionering</label>
                        <select x-model="vCount">
                            <option value="1">1 version</option><option value="2">2 versioner</option><option value="3">3 versioner</option>
                        </select>
                    </div>
                </div>
                <button class="btn-main" @click="build()">GENERÉR LINKS</button>
                <div x-show="links.length" class="link-res">
                    <template x-for="l in links">
                        <input type="text" :value="l.url" readonly @click="copy(l.url)" class="copy-input">
                    </template>
                </div>
            </div>

            <div x-show="tab === 'sms'" x-data="{ msg: '' }">
                <textarea rows="15" x-model="msg" placeholder="Skriv din SMS her..."></textarea>
                <div class="sms-info">
                    Tegn: <span x-text="msg.length"></span> | 
                    SMS: <span x-text="msg.length <= 160 ? (msg.length > 0 ? 1 : 0) : Math.ceil(msg.length/153)"></span>
                </div>
            </div>

            <div x-show="tab === 'ext'" x-data="extLogic()">
                <input type="text" x-model="inp" placeholder="Indsæt link her...">
                <button class="btn-main" @click="run()" style="margin-top:10px;">ANALYSER</button>
                <div x-show="res.length" class="ext-res">
                    <template x-for="r in res">
                        <div class="ext-row"><span x-text="r.k"></span><span x-text="r.v" @click="copy(r.v)" class="red-text"></span></div>
                    </template>
                </div>
            </div>

            <div x-show="tab === 'map'" id="map-workspace">
                <div id="map-container">
                    <svg id="svg-canvas"></svg>
                    <div id="msf-box">
                        <div class="drag-handle">MSF BOKS</div>
                        <div class="box-inner">
                            <div id="box-h" contenteditable="true">OVERSKRIFT</div>
                            <div id="box-s" contenteditable="true">Underskrift her</div>
                        </div>
                    </div>
                    <div id="labels-container"></div>
                </div>
                <div class="map-bar">
                    <div class="controls-left">
                        <label>Tekst:</label>
                        <input type="range" min="10" max="30" @input="updateSize($event.target.value)">
                        <button class="btn-sm" @click="resetZoom()">Reset Zoom</button>
                    </div>
                    <button class="btn-main" @click="exportMap()" style="width:auto; padding:0 30px;">KOPIÉR HTML</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<script src="app.js"></script>
<script src="map.js"></script>
</body>
</html>
