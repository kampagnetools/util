<!DOCTYPE html>
<html lang="da">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MSF Toolkit</title>
    <link rel="stylesheet" href="style.css">
</head>
<body x-data="msfApp()">

<div class="container" :class="{'full-width': tab === 'map'}">
    <div class="app-card">
        <h2>Digital Manager Toolkit</h2>

        <div class="nav-tabs">
            <button :class="{'active': tab === 'utm'}" @click="tab = 'utm'">UTM Builder</button>
            <button :class="{'active': tab === 'sms'}" @click="tab = 'sms'">SMS Tæller</button>
            <button :class="{'active': tab === 'ext'}" @click="tab = 'ext'">Extractor</button>
            <button :class="{'active': tab === 'map'}" @click="tab = 'map'; $nextTick(() => initMap())">Kort Generator</button>
        </div>

        <div x-show="tab === 'utm'" x-data="utmLogic()">
            <div class="field"><label>Mål-URL</label><input type="text" x-model="url" placeholder="https://msf.dk/..."></div>
            <div class="grid-2">
                <div class="field">
                    <label>Kanal</label>
                    <select x-model="chan">
                        <option value="fb_paid">Meta Paid Social</option>
                        <option value="fb_org">Meta Organisk</option>
                        <option value="li_paid">LinkedIn Paid</option>
                        <option value="em_news">Email Nyhedsbrev</option>
                        <option value="sms_camp">SMS Kampagne</option>
                    </select>
                </div>
                <div class="field"><label>Type</label><select x-model="type"><option value="oneoff">One-off</option><option value="felt">Feltpartner</option></select></div>
            </div>
            <div class="grid-2">
                <div class="field"><label>Kampagnekode</label><input type="text" x-model="code" maxlength="4"></div>
                <div class="field"><label>Versionering</label><select x-model="vCount"><option value="1">1</option><option value="2">2</option><option value="3">3</option></select></div>
            </div>
            <button class="btn-main" @click="build()">Generér Links</button>
            <div x-show="links.length" class="link-res">
                <template x-for="l in links"><input type="text" :value="l.url" readonly @click="copy(l.url)" style="cursor:pointer; color:var(--accent); font-weight:bold; margin-bottom:5px; border:none; background:transparent;"></template>
            </div>
        </div>

        <div x-show="tab === 'sms'" x-data="{ msg: '' }">
            <textarea rows="12" x-model="msg" placeholder="Skriv din SMS her..."></textarea>
            <div style="margin-top:10px; font-weight:900; font-size:12px;">TEGN: <span x-text="msg.length"></span> | SMS: <span x-text="msg.length <= 160 ? (msg.length > 0 ? 1 : 0) : Math.ceil(msg.length/153)"></span></div>
        </div>

        <div x-show="tab === 'map'" x-data="mapLogic()">
            <div id="map-area">
                <svg id="svg-canvas"></svg>
                <div id="msf-box">
                    <div class="drag-handle">MSF INFO</div>
                    <div style="padding:15px; color:black;">
                        <div id="box-h" contenteditable="true" style="font-weight:900; font-size:22px; outline:none;">OVERSKRIFT</div>
                        <div id="box-s" contenteditable="true" style="font-size:14px; font-weight:bold; outline:none; margin-top:5px;">Underskrift her</div>
                    </div>
                </div>
                <div id="labels-container" style="position:absolute; top:0; left:0; width:100%; height:100%; pointer-events:none;"></div>
            </div>
            <div class="map-bar">
                <div style="display:flex; gap:15px; align-items:center;">
                    <label>Tekst:</label><input type="range" min="10" max="35" x-model="fontSize" @input="updateSize()">
                    <button @click="reset()" style="padding:5px 10px; cursor:pointer; background:#000; color:#fff; border:none; font-size:10px; font-weight:900;">RESET ZOOM</button>
                </div>
                <button class="btn-main" @click="exportCode()" style="padding:10px 30px; width:auto;">Kopiér HTML</button>
            </div>
        </div>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/d3/7.8.5/d3.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/alpinejs@3.x.x/dist/cdn.min.js" defer></script>
<script src="app.js"></script>
<script src="map.js"></script>
</body>
</html>
